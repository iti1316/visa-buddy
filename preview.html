<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Visa Buddy — 핸드폰 미리보기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      padding: 20px;
    }
    .label {
      color: #888;
      font-size: 12px;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    /* 폰 외곽 프레임 */
    .phone {
      position: relative;
      width: 393px;
      height: 852px;
      background: #111;
      border-radius: 52px;
      box-shadow:
        0 0 0 2px #333,
        0 0 0 6px #1a1a1a,
        0 30px 80px rgba(0,0,0,0.8);
      overflow: hidden;
      flex-shrink: 0;
    }
    /* 다이나믹 아일랜드 */
    .island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 999;
    }
    /* 화면 영역 */
    .screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 50px;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    /* 홈 바 */
    .homebar {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 130px;
      height: 5px;
      background: rgba(255,255,255,0.4);
      border-radius: 3px;
      z-index: 999;
    }
    /* 사이드 버튼들 */
    .btn-right {
      position: absolute;
      right: -4px;
      top: 160px;
      width: 4px;
      height: 70px;
      background: #2a2a2a;
      border-radius: 0 3px 3px 0;
    }
    .btn-left-1 {
      position: absolute;
      left: -4px;
      top: 120px;
      width: 4px;
      height: 36px;
      background: #2a2a2a;
      border-radius: 3px 0 0 3px;
    }
    .btn-left-2 {
      position: absolute;
      left: -4px;
      top: 180px;
      width: 4px;
      height: 64px;
      background: #2a2a2a;
      border-radius: 3px 0 0 3px;
    }
    .btn-left-3 {
      position: absolute;
      left: -4px;
      top: 260px;
      width: 4px;
      height: 64px;
      background: #2a2a2a;
      border-radius: 3px 0 0 3px;
    }
    .info {
      color: #555;
      font-size: 11px;
      margin-top: 20px;
      text-align: center;
      line-height: 1.8;
    }
    .info span { color: #888; }
  </style>
</head>
<body>
  <p class="label">📱 VISA BUDDY — iPhone 14 Pro 미리보기 (393 × 852)</p>

  <div class="phone">
    <!-- 버튼 디테일 -->
    <div class="btn-right"></div>
    <div class="btn-left-1"></div>
    <div class="btn-left-2"></div>
    <div class="btn-left-3"></div>

    <!-- 화면 -->
    <div class="screen">
      <iframe src="index.html" scrolling="yes"></iframe>
    </div>

    <!-- UI 요소 -->
    <div class="island"></div>
    <div class="homebar"></div>
  </div>

  <p class="info">
    👆 <span>아이폰 14 Pro 실제 사이즈 (393 × 852px)</span><br/>
    오른쪽 하단 글쓰기 FAB 버튼 크기를 실제로 확인하세요
  </p>
</body>
</html>
