const AVATAR_COLORS = ['bg-blue-500','bg-green-500','bg-purple-500','bg-orange-500','bg-teal-500','bg-pink-500','bg-red-500','bg-indigo-500'];

function genAuthor() { return `${ANONS[Math.floor(Math.random()*ANONS.length)]} #${Math.floor(Math.random()*900)+100}`; }
function genColor()  { return AVATAR_COLORS[Math.floor(Math.random()*AVATAR_COLORS.length)]; }

/* ────────────────────────────────────────────────────────────
   🔒 렌더 레이어 익명화 — 2중 보안
   저장된 author 값이 허용 패턴과 다르면 (예: 실제 이름·ID가
   미래 백엔드에서 흘러들어올 경우) post.id 기반으로 덮어씁니다.
   화면에는 절대 실제 개인정보가 표시되지 않습니다.
──────────────────────────────────────────────────────────── */
const ANON_PATTERN = new RegExp(`^(${ANONS.join('|')}) #\\d{3}$`);

/** author 필드를 안전한 익명 닉네임으로 보장 */
function safeAuthor(post) {
  if (ANON_PATTERN.test(post.author)) return post.author;
  // 패턴 불일치(실제 ID 유입 등) → post.id 기반 결정론적 익명
  const seed = Math.abs(typeof post.id === 'number' ? post.id : parseInt(post.id, 10) || 1);
  return `${ANONS[seed % ANONS.length]} #${(seed % 900) + 100}`;
}
/** 아바타 문자: author 첫 글자 대신 post.id 기반으로 고정 */
function safeAvatarChar(post) {
  const seed = Math.abs(typeof post.id === 'number' ? post.id : parseInt(post.id, 10) || 1);
  return ['익','D','V','하','H','버','A','B'][seed % 8];
}
/** 아바타 색상: post.id 기반 결정론적 색상 */
function safeAvatarColor(post) {
  const seed = Math.abs(typeof post.id === 'number' ? post.id : parseInt(post.id, 10) || 1);
  return AVATAR_COLORS[seed % AVATAR_COLORS.length];
}

/* ── 커스텀 훅: 게시글 (LocalStorage) ──────────────────────── */
function usePosts() {
  const [posts, setPosts] = useState(() => {
    try {
      const stored = JSON.parse(localStorage.getItem(BOARD_STORE));
      if (!stored) return defaultPosts();
      // 구버전 데이터 마이그레이션: isPublic 없는 글 → 공개 처리
      return stored.map(p => p.isPublic !== undefined ? p : { ...p, isPublic: true });
    }
    catch { return defaultPosts(); }
  });
  const save = (next) => { setPosts(next); localStorage.setItem(BOARD_STORE, JSON.stringify(next)); };
  const addPost    = (p)         => save([p, ...posts]);
  const deletePost = (id)        => save(posts.filter(p => p.id !== id));
  const updatePost = (id, edits) => save(posts.map(p => p.id === id ? { ...p, ...edits } : p));

  function addComment(postId, comment) {
    save(posts.map(p => {
      if (p.id !== postId) return p;
      const list = [...(p.commentsData || []), comment];
      return { ...p, commentsData: list, comments: list.length };
    }));
  }
  function deleteComment(postId, commentId) {
    save(posts.map(p => {
      if (p.id !== postId) return p;
      const list = (p.commentsData || []).filter(c => c.id !== commentId);
      return { ...p, commentsData: list, comments: list.length };
    }));
  }

  return { posts, addPost, deletePost, updatePost, addComment, deleteComment };
}

/* ================================================================
   댓글 섹션 — PostCard / TalkListView 공용
================================================================ */
function CommentSection({ post, lang, onAddComment, onDeleteComment }) {
  const L = LANG[lang];
  const comments = post.commentsData || [];

  const [body, setBody]       = useState('');
  const [pw,   setPw]         = useState('');
  const [delModal, setDelModal] = useState(null); // comment object to delete

  function submit() {
    if (!body.trim()) return;
    onAddComment(post.id, {
      id:     Date.now(),
      author: genAuthor(),
      date:   new Date().toLocaleDateString('ko-KR'),
      body:   body.trim(),
      pw:     pw.length === 4 ? pw : null,
    });
    setBody('');
    setPw('');
  }

  function handleDelConfirm(entered, onFail) {
    if (!delModal) return;
    if (!delModal.pw || entered !== delModal.pw) { onFail(); return; }
    onDeleteComment(post.id, delModal.id);
    setDelModal(null);
  }

  return (
    <div className="border-t border-gray-100 bg-gray-50">
      {/* 댓글 목록 */}
      {comments.length === 0 ? (
        <p className="text-xs text-gray-400 text-center py-4">{L.cmtEmpty}</p>
      ) : (

              <div className={`w-7 h-7 rounded-full ${safeAvatarColor({id:c.id})} flex items-center justify-center text-white text-xs font-black flex-shrink-0`}>
                {safeAvatarChar({id:c.id})}

              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-0.5">
                  <p className="text-[11px] font-bold text-gray-700">{c.author}</p>
                  <p className="text-[10px] text-gray-400">{c.date}</p>
                  {c.pw && (
                    <button onClick={() => setDelModal(c)}
                      className="ml-auto text-[10px] text-red-400 hover:text-red-600 border border-red-100 hover:border-red-300 px-1.5 py-0.5 rounded tap transition">
                      {L.cmtDelete}
                    </button>
                  )}
                </div>
                <p className="text-xs text-gray-600 word-keep leading-relaxed">{c.body}</p>
              </div>
            </li>
          ))}
        </ul>
      )}

      {/* 댓글 작성 폼 */}
      <div className="px-4 pb-4 pt-2">
        <textarea
          value={body}
          onChange={e => setBody(e.target.value)}
          placeholder={L.cmtPlaceholder}
          rows={2}
          className="w-full text-xs text-gray-700 border border-gray-200 rounded-xl px-3 py-2.5 focus:outline-none focus:border-blue-400 placeholder-gray-300 resize-none leading-relaxed"
        />
        <div className="flex gap-2 mt-2">
          <input
            type="password" inputMode="numeric" maxLength={4}
            value={pw}
            onChange={e => setPw(e.target.value.replace(/\D/g, ''))}
            placeholder={L.cmtPwPlaceholder}
            className="flex-1 text-xs border border-gray-200 rounded-xl px-3 py-2 focus:outline-none focus:border-blue-400 tracking-widest text-center"
          />
          <button
            onClick={submit}
            disabled={!body.trim()}
            className="px-4 py-2 bg-blue-700 text-white text-xs font-black rounded-xl disabled:opacity-40 tap transition">
            {L.cmtSubmit}
          </button>
        </div>
        <p className="text-[10px] text-gray-300 mt-1.5">{L.cmtPwNote}</p>
      </div>

      {/* 댓글 삭제 비밀번호 모달 */}
      {delModal && (
        <PwModal lang={lang} onConfirm={handleDelConfirm} onCancel={() => setDelModal(null)} />
      )}
    </div>
  );
}

/* 게시글 카드 */
function PostCard({ post, lang = 'vi', onDelete, onEdit, onAddComment, onDeleteComment }) {
  const [r, setR]           = useState({ likes:post.likes, hearts:post.hearts, wows:post.wows });
  const [act, setAct]       = useState(null);
  const [modal, setModal]   = useState(null); // 'edit' | 'delete' | 'view' | null
  const [unlocked, setUnlocked] = useState(false);
  const [showCmt, setShowCmt]   = useState(false);
  const L = LANG[lang];

  function react(type) {
    const same = act === type;
    setR(p => {
      const n = { ...p };
      if (same) { n[type] = Math.max(0, n[type]-1); }
      else { if (act) n[act] = Math.max(0, n[act]-1); n[type]++; }
      return n;
    });
    setAct(same ? null : type);
  }

  function handlePwConfirm(pw, onFail) {
    if (!post.pw || pw !== post.pw) { onFail(); return; }
    if (modal === 'delete') {
      setModal(null);
      onDelete && onDelete(post.id);
    } else if (modal === 'edit') {
      setModal(null);
      onEdit && onEdit(post);
    } else if (modal === 'view') {
      setModal(null);
      setUnlocked(true);
    }
  }

  /* ── 비공개 글: 잠금 화면 (비번 입력하면 열람 가능) ── */
  if (post.isPublic !== true && !unlocked) {
    return (
      <>
        <div className="bg-white rounded-2xl shadow-sm overflow-hidden mb-3 border border-gray-100 fade-in">
          <div className="px-4 py-4">
            <div className="flex items-center gap-2 mb-3 flex-wrap">
              <span className="text-[10px] font-black text-gray-400 bg-gray-100 px-2.5 py-1 rounded-full">{L.privateLabel}</span>
              <span className="text-[10px] text-gray-300 ml-auto">{post.date}</span>
            </div>
            <div className="bg-gray-50 rounded-xl px-4 py-3.5 flex items-start gap-2 mb-3">
              <span className="text-base flex-shrink-0">🔒</span>
              <p className="text-xs text-gray-400 word-keep leading-relaxed">
                {L.privateMsg}<br/>
                <span className="text-gray-300">{L.privateSub}</span>
              </p>
            </div>
            {/* 비밀번호로 열람 버튼 */}
            {post.pw && (
              <button onClick={() => setModal('view')}
                className="w-full py-2.5 border-2 border-blue-200 text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-xl text-xs font-black tap transition flex items-center justify-center gap-1.5">
                🔑 {lang === 'vi' ? 'Nhập mật khẩu để xem' : '비밀번호로 열람하기'}
              </button>
            )}
          </div>
        </div>
        {modal === 'view' && (
          <PwModal lang={lang} onConfirm={handlePwConfirm} onCancel={() => setModal(null)} />
        )}
      </>
    );
  }

  /* ── 공개 글: 전체 렌더링 ── */
  const total    = r.likes + r.hearts + r.wows;
  const cmtCount = (post.commentsData || []).length || post.comments || 0;
  const BTNS = [
    { t:'likes',  i:'👍', l:'Thích',   lko:'좋아요',  on:'text-blue-600 bg-blue-50' },
    { t:'hearts', i:'❤️', l:'Tuyệt',   lko:'최고예요', on:'text-red-500 bg-red-50' },

/* ================================================================
   자유 토크방 — 리액션 미니 버튼 (아코디언 상세 내에서 사용)
================================================================ */
function TalkReaction({ post, lang }) {
  const [r, setR]   = useState({ likes:post.likes||0, hearts:post.hearts||0, wows:post.wows||0 });
  const [act, setAct] = useState(null);
  const ITEMS = [
    { t:'likes',  i:'👍', vi:'Thích',    ko:'좋아요',  on:'text-blue-600' },
    { t:'hearts', i:'❤️', vi:'Tuyệt',    ko:'최고예요', on:'text-red-500' },
    { t:'wows',   i:'😮', vi:'Wow',      ko:'놀라워요', on:'text-amber-500' },
  ];
  function react(t) {
    const same = act === t;
    setR(p => {
      const n = { ...p };
      if (same) n[t] = Math.max(0, n[t]-1);
      else { if (act) n[act] = Math.max(0, n[act]-1); n[t]++; }
      return n;
    });
    setAct(same ? null : t);
  }
  return (
    <div className="flex gap-1.5">
      {ITEMS.map(b => (
        <button key={b.t} onClick={() => react(b.t)}
          className={`flex items-center gap-0.5 text-[10px] px-2 py-1 rounded-lg border tap transition
            ${act===b.t ? `${b.on} bg-opacity-10 border-current` : 'text-gray-400 border-gray-200 hover:bg-gray-50'}`}>
          <span>{b.i}</span>
          <span className="font-bold">{r[b.t] > 0 ? r[b.t] : (lang==='vi' ? b.vi : b.ko)}</span>
        </button>
      ))}
    </div>
  );
}

================================================================ */

  const TALK_REPORTS = 'vb_talk_reports';
  const [selected, setSelected] = useState(null);
  const [reported, setReported] = useState(() => {
    try { return JSON.parse(localStorage.getItem(TALK_REPORTS) || '[]'); }
    catch { return []; }
  });
  const [pwModal, setPwModal]   = useState(null); // { action:'edit'|'delete'|'view', post }
  const [viewUnlocked, setViewUnlocked] = useState([]); // 비공개 열람 완료 id 배열
  const L = LANG[lang];

  const talkPosts = posts.filter(p => p.cat === 'talk');

  function doReport(id) {
    if (reported.includes(id)) return;
    const next = [...reported, id];
    setReported(next);
    localStorage.setItem(TALK_REPORTS, JSON.stringify(next));
    if (selected === id) setSelected(null);

    if (!pwModal) return;

    if (action === 'delete') {

    } else if (action === 'edit') {

              <p className="text-sm font-black text-gray-800">
                {lang === 'vi' ? 'Góc Tán Gẫu' : '🟢 자유 토크방'}

              <p className="text-[10px] text-gray-400">
                {lang === 'vi' ? 'Tán gẫu tự do · Không liên quan đến visa' : '비자 외 자유 수다 · 일상 토크'}

              {L.talkWriteBtn}

              {L.talkClose} ✕
            </button>
          </div>
        </div>
      </div>

      {/* 게시글 리스트 */}
      <div className="max-w-lg mx-auto mt-2 bg-white shadow-sm overflow-hidden rounded-t-2xl">
        {/* 테이블 헤더 */}

          style={{gridTemplateColumns:'2rem 1fr 4.5rem 3.5rem'}}>

          <p className="text-[10px] font-black text-gray-400">{L.talkColTitle}</p>

        {talkPosts.length === 0 ? (
          <div className="text-center py-14">

              const num       = talkPosts.length - idx;
              const isBlinded = reported.includes(p.id);
              const isOpen    = selected === p.id;
              const isUnlocked = viewUnlocked.includes(p.id);

                      {isBlinded ? (
                        <p className="text-[11px] text-gray-300 italic">{L.talkBlinded}</p>

                  {/* ─ 아코디언 상세 ─ */}
                  {isOpen && (
                    <div className="bg-green-50 border-t border-green-100 px-4 py-4 fade-in">
                      {/* 비공개 잠금 상태 */}

                            </button>
                          )}
                        </div>
                      ) : (
                        <>
                          {/* 작성자 정보 */}
                          <div className="flex items-center gap-2 mb-3">
                            <div className={`w-7 h-7 rounded-full ${safeAvatarColor(p)} flex items-center justify-center text-white text-xs font-black flex-shrink-0`}>
                              {safeAvatarChar(p)}

                            <div className="flex-1">
                              <p className="text-xs font-bold text-gray-700">{safeAuthor(p)}</p>

                                🔒
                              </button>
                            )}
                          </div>
                          {/* 본문 */}
                          <p className="text-xs text-gray-700 leading-relaxed word-keep mb-3">{p.body}</p>
                          {/* 리액션 + 수정/삭제/신고 */}
                          <div className="flex items-center gap-2 flex-wrap">
                            <TalkReaction post={p} lang={lang} />
                            <div className="flex gap-1.5 ml-auto">
                              {p.pw && (
                                <>
                                  <button onClick={()=>setPwModal({action:'edit', post:p})}
                                    className="text-[10px] text-blue-500 border border-blue-200 px-2 py-1 rounded-lg hover:bg-blue-50 tap">
                                    {L.editBtn}

                      {p.date.slice(5)}
                    </p>
                  </div>

                  {/* ─ 아코디언 상세 ─ */}
                  {isOpen && (
                    <div className={`border-t border-gray-100 px-4 py-4 fade-in ${badge.bg}`}>
                      {isPrivate && !isUnlocked ? (
                        <div className="flex flex-col items-center gap-3 py-4">
                          <span className="text-3xl">🔒</span>
                          <p className="text-xs text-gray-500 text-center word-keep">
                            {lang==='vi' ? 'Bài viết riêng tư. Nhập mật khẩu để xem.' : '비공개 글입니다. 비밀번호를 입력해주세요.'}
                          </p>
                          {p.pw && (
                            <button onClick={() => setPwModal({action:'view', post:p})}
                              className="text-xs font-black text-blue-600 bg-white border border-blue-200 px-4 py-2 rounded-xl tap">
                              🔑 {lang==='vi' ? 'Nhập mật khẩu' : '비밀번호 입력'}
                            </button>
                          )}
                        </div>
                      ) : (
                        <>
                          {/* 작성자 정보 */}
                          <div className="flex items-center gap-2 mb-3">
                            <div className={`w-7 h-7 rounded-full ${safeAvatarColor(p)} flex items-center justify-center text-white text-xs font-black flex-shrink-0`}>
                              {safeAvatarChar(p)}
                            </div>
                            <div className="flex-1">
                              <p className="text-xs font-bold text-gray-700">{safeAuthor(p)}</p>
                              <p className="text-[10px] text-gray-400">{p.date}</p>
                            </div>
                            <span className={`text-[9px] font-black px-2 py-0.5 rounded-full bg-white/70 ${badge.text}`}>
                              {badge.emoji} {lang==='vi' ? badge.vi : badge.ko}
                            </span>
                          </div>
                          {/* 본문 */}
                          <p className="text-xs text-gray-700 leading-relaxed word-keep mb-3">{p.body}</p>
                          {/* 리액션 + 수정/삭제/신고 */}
                          <div className="flex items-center gap-2 flex-wrap">
                            <TalkReaction post={p} lang={lang} />
                            <div className="flex gap-1.5 ml-auto">
                              {p.pw && (
                                <>
                                  <button onClick={() => setPwModal({action:'edit', post:p})}
                                    className="text-[10px] text-blue-500 border border-blue-200 bg-white/70 px-2 py-1 rounded-lg hover:bg-white tap">
                                    {L.editBtn}
                                  </button>
                                  <button onClick={() => setPwModal({action:'delete', post:p})}
                                    className="text-[10px] text-red-500 border border-red-200 bg-white/70 px-2 py-1 rounded-lg hover:bg-white tap">
                                    {L.deleteBtn}
                                  </button>
                                </>
                              )}
                              <button onClick={() => doReport(p.id)}
                                className={`text-[10px] px-2 py-1 rounded-lg border tap
                                  ${reported.includes(p.id)
                                    ? 'text-gray-300 border-gray-100 cursor-default'
                                    : 'text-orange-500 border-orange-200 bg-white/70 hover:bg-white'}`}>
                                🚩 {reported.includes(p.id) ? L.talkReported : L.talkReport}
                              </button>
                            </div>
                          </div>
                          {/* 댓글 섹션 */}
                          <div className="mt-3 -mx-4 -mb-4">
                            <CommentSection
                              post={p} lang={lang}
                              onAddComment={onAddComment}
                              onDeleteComment={onDeleteComment} />
                          </div>
                        </>
                      )}
                    </div>
                  )}
                </li>
              );
            })}
          </ul>
        )}
      </div>

      {pwModal && (
        <PwModal lang={lang} onConfirm={handlePwConfirm} onCancel={() => setPwModal(null)} />
      )}
    </div>
  );
}

function loadNotices() {
  try {
    const raw = localStorage.getItem(NOTICE_STORE);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return DEFAULT_NOTICES;
}
function saveNotices(arr) {
  localStorage.setItem(NOTICE_STORE, JSON.stringify(arr));
}

/* ── 관리자 공지 편집 모달 ── */
function NoticeAdminModal({ notices, lang, onSave, onClose }) {
  const [list, setList] = useState(notices.map(n => ({ ...n })));

  function update(idx, field, val) {
    setList(prev => prev.map((n, i) => i === idx ? { ...n, [field]: val } : n));
  }
  function addNotice() {
    const newId = Math.max(...list.map(n => n.id), 0) + 1;
    setList(prev => [...prev, { id: newId, urgent: false, date: new Date().toLocaleDateString('ko-KR').replace(/\. /g,'.').replace('.',''), ko: '', vi: '' }]);
  }
  function removeNotice(idx) {
    if (list.length <= 1) return alert('공지는 최소 1개 이상 있어야 합니다.');
    setList(prev => prev.filter((_,i) => i !== idx));
  }

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" onClick={onClose}>
      <div className="absolute inset-0 bg-black/60" />
      <div
        className="relative w-full max-w-lg bg-white rounded-t-2xl px-4 pt-5 pb-8 fade-in overflow-y-auto max-h-[85vh]"
        onClick={e => e.stopPropagation()}
      >
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-base font-black text-gray-800">🔧 공지 관리</h2>
          <button onClick={onClose} className="text-gray-400 text-xl font-bold">✕</button>
        </div>

        {list.map((n, i) => (
          <div key={n.id} className="mb-4 bg-gray-50 rounded-xl p-3 border border-gray-200">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs font-bold text-gray-500">공지 {i+1}</span>
              <div className="flex items-center gap-2">
                <label className="flex items-center gap-1 text-xs text-red-500 font-bold cursor-pointer">
                  <input type="checkbox" checked={n.urgent} onChange={e => update(i,'urgent',e.target.checked)} className="w-3 h-3" />
                  중요
                </label>
                <button onClick={() => removeNotice(i)} className="text-red-400 text-xs font-bold tap">삭제</button>
              </div>
            </div>
            <input
              type="date"
              value={n.date.replace(/\./g,'-')}
              onChange={e => update(i,'date', e.target.value.replace(/-/g,'.'))}
              className="w-full text-xs border border-gray-300 rounded-lg px-2 py-1.5 mb-2"
            />
            <textarea
              rows={3}
              placeholder="한국어 공지 내용"
              value={n.ko}
              onChange={e => update(i,'ko',e.target.value)}
              className="w-full text-xs border border-gray-300 rounded-lg px-2 py-1.5 mb-2 resize-none"
            />
            <textarea
              rows={3}
              placeholder="베트남어 공지 내용 (Nội dung thông báo tiếng Việt)"
              value={n.vi}
              onChange={e => update(i,'vi',e.target.value)}
              className="w-full text-xs border border-gray-300 rounded-lg px-2 py-1.5 resize-none"
            />
          </div>
        ))}

        <button onClick={addNotice} className="w-full border-2 border-dashed border-blue-300 text-blue-500 font-bold text-sm py-2.5 rounded-xl mb-3 tap">
          + 공지 추가
        </button>
        <button
          onClick={() => { onSave(list); onClose(); }}
          className="w-full bg-blue-700 text-white font-black py-3 rounded-xl tap"
        >
          저장하기
        </button>
      </div>
    </div>
  );
}

/* ── 관리자 비밀번호 입력 모달 ── */

  const [pw, setPw] = useState('');

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center px-6" onClick={onClose}>

        <p className="text-xs text-gray-400 text-center mb-4">비밀번호를 입력하세요</p>

/* ── 메인 NoticeSection ── */
function NoticeSection({ lang }) {
  const [notices, setNotices] = useState(() => loadNotices());
  const [idx, setIdx] = useState(0);
  const [detail, setDetail] = useState(null);      // 상세 보기 중인 공지
  const [showPw, setShowPw] = useState(false);      // 비밀번호 모달
  const [showAdmin, setShowAdmin] = useState(false); // 관리자 편집 모달
  const [tapCount, setTapCount] = useState(0);       // 숨겨진 관리자 접근용 (카운터 5번)
  const tapTimer = useRef(null);

  useEffect(() => {
    if (notices.length === 0) return;
    const t = setInterval(() => {
      setIdx(i => (i + 1) % notices.length);
    }, 4000);
    return () => clearInterval(t);
  }, [notices.length]);

  function handleBannerClick() {
    setDetail(notices[idx]);
  }

  /* 날짜 표시 5번 탭 → 관리자 모달 (숨겨진 접근) */
  function handleCounterTap() {
    setTapCount(c => {
      const next = c + 1;
      clearTimeout(tapTimer.current);
      if (next >= 5) {
        setShowPw(true);
        return 0;
      }
      tapTimer.current = setTimeout(() => setTapCount(0), 2000);
      return next;
    });
  }

  function handleAdminSave(updated) {
    const cleaned = updated.filter(n => n.ko.trim() || n.vi.trim());
    saveNotices(cleaned);
    setNotices(cleaned);
    setIdx(0);
  }

  if (notices.length === 0) return null;
  const n = notices[idx];

  return (
    <>
      <div
        className="bg-blue-700 px-4 py-2.5 flex items-center gap-2.5 cursor-pointer active:bg-blue-800 transition-colors"
        onClick={handleBannerClick}
      >
        <span className={`flex-shrink-0 text-[9px] font-black px-1.5 py-0.5 rounded-full ${n.urgent ? 'bg-yellow-400 text-blue-800' : 'bg-blue-500 text-white'}`}>
          {n.urgent ? '🔴 중요' : '📢 공지'}
        </span>
        <p className="flex-1 text-[11px] text-white font-medium truncate word-keep">
          {n[lang]}
        </p>
        <span
          className="flex-shrink-0 text-[10px] text-blue-300 font-bold select-none"
          onClick={e => { e.stopPropagation(); handleCounterTap(); }}
        >
          {idx + 1}/{notices.length}
        </span>
      </div>

      {detail && (
        <NoticeDetailModal
          notice={detail}
          lang={lang}
          onClose={() => setDetail(null)}
        />
      )}
      {showPw && (
        <AdminPwModal
          onSuccess={() => { setShowPw(false); setShowAdmin(true); }}
          onClose={() => setShowPw(false)}
        />
      )}
      {showAdmin && (
        <NoticeAdminModal
          notices={notices}
          lang={lang}
          onSave={handleAdminSave}
          onClose={() => setShowAdmin(false)}
        />
      )}
    </>
  );
}

              : 'Đặt lịch online tại Hi-Korea (www.hikorea.go.kr) sau khi đăng nhập → Đặt lịch dịch vụ. Nên đặt trước 3 tháng khi hết hạn.'}
          </p>

/* ── 비자 여정 시각화 섹션 ── */
function VisaTreeSection({ lang, visaType, onChangeType }) {
  const tree = VISA_TREES[visaType];
  const [currentStep, setCurrentStep] = useState(() => localStorage.getItem(VISA_STEP_STORE) || null);

  function tapStep(id) {
    const next = currentStep === id ? null : id;
    setCurrentStep(next);
    if (next) localStorage.setItem(VISA_STEP_STORE, next);
    else localStorage.removeItem(VISA_STEP_STORE);
  }

  function stepState(stepId, allSteps) {
    if (!currentStep) return 'future';
    const currentIdx = allSteps.findIndex(s => s.id === currentStep);
    const thisIdx    = allSteps.findIndex(s => s.id === stepId);
    if (currentIdx === -1) return 'future';
    if (thisIdx < currentIdx)  return 'done';
    if (thisIdx === currentIdx) return 'current';
    return 'future';
  }

  function StepNode({ step, state }) {
    const isDone    = state === 'done';
    const isCurrent = state === 'current';
    return (
      <button onClick={() => tapStep(step.id)} className="flex flex-col items-center gap-1.5 flex-shrink-0 w-[62px] tap">
        <div className={`w-[56px] h-11 rounded-xl flex items-center justify-center border-2 transition-all
          ${isDone    ? 'bg-green-500 border-green-400 text-white' :
            isCurrent ? `${tree.color} border-transparent text-white shadow-md ring-2 ${tree.ring}` :
                        'bg-gray-100 border-gray-200 text-gray-500'}`}>
          {isDone
            ? <span className="text-base font-black">✓</span>
            : <span className={`text-[10px] font-black leading-tight text-center px-1 ${step.final ? 'text-[11px]' : ''}`}>{step.code}</span>}
        </div>
        <p className={`text-[9px] font-bold text-center leading-tight
          ${isCurrent ? tree.text : isDone ? 'text-green-600' : 'text-gray-400'}`}>
          {lang==='vi' ? step.vi : step.ko}
        </p>
      </button>
    );
  }

  const allStepIds = [
    ...tree.steps,
    ...(tree.branches ? tree.branches.flatMap(b => b.steps) : [])
  ];

  return (
    <section className="mt-3 px-3">
      <div className="bg-white rounded-2xl shadow-sm overflow-hidden">
        {/* 헤더 */}
        <div className={`px-4 py-2.5 ${tree.light} border-b border-gray-100 flex items-center justify-between`}>
          <div className="flex items-center gap-2">
            <span className="text-lg">{tree.icon}</span>
            <div>
              <p className={`text-xs font-black ${tree.text}`}>{tree.label[lang==='vi'?'vi':'ko']}</p>
              <p className="text-[9px] text-gray-400">{lang==='vi' ? '← Nhấn vào bước để đánh dấu giai đoạn hiện tại' : '← 현재 단계 탭해서 표시'}</p>
            </div>
          </div>
          <button onClick={onChangeType} className={`text-[10px] font-bold px-2.5 py-1 rounded-full border ${tree.text} border-current tap`}>
            {lang==='vi' ? '변경' : '변경'}
          </button>
        </div>

        {/* 노드 트리 */}
        <div className="px-3 py-3 overflow-x-auto" style={{scrollbarWidth:'none'}}>
          {/* 일반 루트 (worker / student): 가로 스크롤 */}
          {!tree.branches && (
            <div className="flex items-start gap-1 min-w-max">
              {tree.steps.map((step, i) => (
                <React.Fragment key={step.id}>
                  <StepNode step={step} state={stepState(step.id, allStepIds)} />
                  {i < tree.steps.length - 1 && (
                    <span className="text-gray-300 text-sm self-center flex-shrink-0 mt-[-10px]">›</span>
                  )}
                </React.Fragment>
              ))}
            </div>
          )}

          {/* 결혼 루트: F-6 + 분기 2가지 */}
          {tree.branches && (
            <div className="flex items-center gap-2">
              <StepNode step={tree.steps[0]} state={stepState(tree.steps[0].id, allStepIds)} />
              <span className="text-gray-300 text-sm flex-shrink-0">›</span>
              <div className="flex flex-col gap-2">
                {tree.branches.map(branch => (
                  <div key={branch.label.ko} className="flex items-center gap-1.5">
                    <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded-full ${tree.light} ${tree.text} flex-shrink-0`}>
                      {branch.label[lang==='vi'?'vi':'ko']}
                    </span>
                    {branch.steps.map(s => (
                      <StepNode key={s.id} step={s} state={stepState(s.id, allStepIds)} />
                    ))}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 지름길 안내 (student) */}
          {tree.shortcut && (
            <p className={`text-[9px] ${tree.text} mt-2 px-1 font-bold word-keep`}>{tree.shortcut[lang==='vi'?'vi':'ko']}</p>
          )}
        </div>

        {/* 하단 메모 */}
        <div className="px-4 py-2 border-t border-gray-50">
          <p className="text-[9px] text-gray-400 word-keep">💡 {tree.note[lang==='vi'?'vi':'ko']}</p>
        </div>
      </div>
    </section>
  );
}

function GuidePage({ type, onBack, lang }) {

  return (
    <div style={{ background:'#F0F2F5' }} className="min-h-screen">
      <BackHeader title={T(d.title)} onBack={onBack} />

        <p className="text-xs text-gray-400 mb-4">{T(d.sub)}</p>
        <div className="flex flex-col gap-4">
          {d.sections.map((s, i) => (
            <div key={i} className="bg-white rounded-2xl shadow-sm overflow-hidden fade-in">
              <div className={`px-4 py-3 border-b border-gray-50 ${s.warn?'bg-red-50':s.tip?'bg-amber-50':''}`}>
                <p className={`text-sm font-black flex items-center gap-2 ${s.warn?'text-red-700':s.tip?'text-amber-700':'text-gray-800'}`}>
                  <span>{s.icon}</span>{T(s.title)}
                </p>
              </div>
              <div className="px-4 py-3.5">
                {s.items && (
                  <ul className="flex flex-col gap-2">
                    {s.items.map((item, j) => (
                      <li key={j} className={`flex items-start gap-2 text-xs word-keep ${s.warn?'text-red-600':s.tip?'text-amber-700':'text-gray-600'}`}>
                        <span className="flex-shrink-0">{s.warn?'⚠️':s.tip?'→':'•'}</span>{T(item)}
                      </li>
                    ))}
                  </ul>
                )}
                {s.steps && (
                  <ol className="flex flex-col gap-3">
                    {s.steps.map((st, j) => (
                      <li key={j} className="flex items-start gap-3">
                        <span className={`w-6 h-6 rounded-full ${d.color} text-white text-xs font-black flex items-center justify-center flex-shrink-0`}>{st.n}</span>
                        <div className="pt-0.5">
                          <p className="text-xs font-black text-gray-800">{L==='vi' ? st.vi_t : st.ko_t}</p>
                          <p className="text-[11px] text-gray-500 mt-0.5 word-keep">{L==='vi' ? st.vi_d : st.ko_d}</p>

                    ))}

                )}
                {s.table && (
                  <div className="overflow-x-auto -mx-1">
                    <table className="w-full text-xs">
                      <thead>
                        <tr className="bg-gray-50">
                          {s.table[0].map((h,j) => <th key={j} className="px-2 py-2 text-left font-black text-gray-600 whitespace-nowrap">{h}</th>)}
                        </tr>
                      </thead>
                      <tbody>
                        {s.table.slice(1).map((row, j) => (
                          <tr key={j} className="border-t border-gray-50">
                            {row.map((cell, k) => (
                              <td key={k} className={`px-2 py-2 word-keep ${k===1?'font-black text-blue-700':'text-gray-600'}`}>{cell}</td>

          {L==='vi' ? '← Về trang chính' : '← 메인으로 돌아가기'}

}

            className={`w-9 h-9 rounded-full bg-black/10 flex items-center justify-center ${m.tCls} text-2xl tap`}>‹</button>
          <div className="flex-1">
            <p className={`text-sm font-black ${m.tCls}`}>{m.emoji} {m[lang]}</p>
            <p className={`text-[10px] ${m.tCls} opacity-70`}>{lang==='vi' ? m.ko : m.vi}</p>
          </div>
          <button onClick={() => nav({ page:'write', param:cat })}
            className={`text-xs font-black ${m.tCls} bg-black/10 hover:bg-black/20 px-3 py-1.5 rounded-full tap transition`}>
            {L.writeBtn}
          </button>
        </div>
      </header>

      <div className="max-w-lg mx-auto px-3 pt-3 pb-20">
        {filtered.length === 0 ? (
          <div className="text-center py-20 fade-in">
            <div className="text-5xl mb-3">📭</div>
            <p className="text-sm text-gray-400 mb-4 word-keep">{L.noPost.split('\n').map((t,i)=><span key={i}>{t}{i===0&&<br/>}</span>)}</p>
            <button onClick={() => nav({ page:'write', param:cat })}
              className="bg-blue-700 text-white font-bold text-sm px-6 py-3 rounded-xl tap transition">
              {L.firstPost}
            </button>
          </div>
        ) : (
          filtered.map(p => (
            <PostCard key={p.id} post={p} lang={lang}
              onDelete={onDeletePost}
              onEdit={(p) => nav({ page:'write', param:p.cat, editPost:p })}
              onAddComment={onAddComment}
              onDeleteComment={onDeleteComment} />
          ))
        )}
      </div>
    </div>
  );
}

/* ================================================================
   페이지: 글쓰기
================================================================ */
const CAT_OPTS = [
  { v:'hall',   e:'🏆', label:'합격 명예의 전당', desc:'합격 인증, 점수 스펙 공유',  sel:'border-yellow-300 bg-yellow-50', t:'text-yellow-700', d:'text-yellow-500' },
  { v:'sos',    e:'🚨', label:'비자 119 SOS',     desc:'긴급 서류·절차 질문',        sel:'border-red-300 bg-red-50',       t:'text-red-700',    d:'text-red-500' },
  { v:'bamboo', e:'💬', label:'출입국 참교육방',  desc:'반려·실패담, 출입국 썰',      sel:'border-orange-300 bg-orange-50', t:'text-orange-700', d:'text-orange-500' },
  { v:'talk',   e:'🟢', label:'자유 토크방',       desc:'비자 외 일상·자유 수다',      sel:'border-green-300 bg-green-50',   t:'text-green-700',  d:'text-green-500' },
];

const CAT_LABELS_VI = {
  hall:   { vi:'Bảng Vàng',           desc_vi:'Chia sẻ kết quả đậu' },
  sos:    { vi:'Cứu Trợ Khẩn Cấp',   desc_vi:'Câu hỏi khẩn về hồ sơ/thủ tục' },
  bamboo: { vi:'Kinh nghiệm Thực tế', desc_vi:'Trải nghiệm bị từ chối' },
  talk:   { vi:'Góc Tán Gẫu',         desc_vi:'Tán gẫu tự do, không liên quan visa' },
};

function WritePage({ initCat, editPost, nav, lang = 'vi', onAddPost, onUpdatePost }) {
  const isEdit  = !!editPost;
  const isTalk  = (editPost?.cat || initCat) === 'talk';
  const [cat, setCat] = useState(editPost?.cat || initCat || 'hall');
  const [title, setTitle] = useState(editPost?.title || '');
  const [body, setBody]   = useState(editPost?.body  || '');
  const [vis, setVis]     = useState(editPost ? (editPost.isPublic ? 'public' : 'private') : 'public');
  const [pw, setPw]       = useState('');
  const [toast, setToast] = useState(null);
  const L = LANG[lang];

  const CAT_LABELS = {
    hall:   { vi:'Bảng Vàng', ko:'합격 명예의 전당', desc_vi:'Chia sẻ kết quả đậu', desc_ko:'합격 인증, 점수 스펙 공유' },
    sos:    { vi:'Cứu Trợ Khẩn Cấp',  ko:'비자 119 SOS',     desc_vi:'Câu hỏi khẩn về hồ sơ/thủ tục', desc_ko:'긴급 서류·절차 질문' },
    bamboo: { vi:'Kinh nghiệm Thực tế', ko:'출입국 참교육방',  desc_vi:'Trải nghiệm bị từ chối', desc_ko:'반려·실패담, 출입국 썰' },
  };

  function submit() {
    if (!title.trim() || !body.trim()) { setToast(L.emptyAlert); return; }
    if (!isEdit) {
      if (!pw.trim()) { setToast(L.pwEmptyAlert); return; }
      if (pw.length !== 4) { setToast(L.pwLengthAlert); return; }
    }
    if (isEdit) {
      onUpdatePost(editPost.id, {
        cat, title: title.trim(), body: body.trim(), isPublic: vis === 'public',
      });
    } else {
      const author = genAuthor();
      onAddPost({
        id: Date.now(), cat, author,
        date: new Date().toLocaleDateString('ko-KR'),
        title: title.trim(), body: body.trim(),
        likes:0, hearts:0, wows:0, comments:0, isNew:true,
        isPublic: vis === 'public',
        pw,
      });
    }
    nav({ page:'home' });
  }

  function goBack() {
    nav({ page:'home' });
  }

  return (
    <div style={{ background:'#F0F2F5' }} className="min-h-screen">
      <BackHeader title={isEdit ? (lang==='vi'?'✏️ Chỉnh sửa bài':'✍️ 글 수정') : L.writePageTitle}
        onBack={goBack} />
      <div className="max-w-lg mx-auto px-4 py-4 pb-12">

        {/* 카테고리 선택 — talk에서 진입 시 자유 토크방 고정 표시, 변경 불가 */}
        {isTalk ? (
          <div className="bg-green-50 border border-green-200 rounded-2xl px-4 py-3 mb-3 fade-in flex items-center gap-3">
            <span className="text-xl">🟢</span>
            <div>
              <p className="text-xs font-black text-green-700">
                {lang==='vi' ? 'Góc Tán Gẫu' : '자유 토크방'}
              </p>
              <p className="text-[10px] text-green-600">
                {lang==='vi' ? 'Tán gẫu tự do, không liên quan visa' : '비자 외 일상·자유 수다'}
              </p>
            </div>
          </div>
        ) : (
          <div className="bg-white rounded-2xl shadow-sm px-4 py-4 mb-3 fade-in">
            <p className="text-xs font-black text-gray-500 mb-3">{L.selectBoard}</p>
            <div className="flex flex-col gap-2">
              {CAT_OPTS.filter(o => o.v !== 'talk').map(o => {
                const cl = CAT_LABELS_VI[o.v];
                return (
                  <button key={o.v} onClick={() => setCat(o.v)}
                    className={`text-left px-4 py-3 rounded-xl border-2 transition tap ${cat===o.v ? o.sel : 'border-gray-200 bg-white'}`}>
                    <div className="flex items-center gap-2">
                      <span className="text-base">{o.e}</span>
                      <div>
                        <p className={`text-xs font-black ${cat===o.v?o.t:'text-gray-400'}`}>
                          {lang==='vi' ? cl.vi : o.label}
                        </p>
                        <p className={`text-[10px] mt-0.5 ${cat===o.v?o.d:'text-gray-300'}`}>
                          {lang==='vi' ? cl.desc_vi : o.desc}
                        </p>
                      </div>
                    </div>
                  </button>
                );
              })}
            </div>
          </div>
        )}

        {/* 제목 */}
        <div className="bg-white rounded-2xl shadow-sm px-4 py-3 mb-3 fade-in">
          <input value={title} onChange={e=>setTitle(e.target.value)} maxLength={60}
            placeholder={L.titlePlaceholder}
            className="w-full text-sm font-bold text-gray-800 focus:outline-none placeholder-gray-300" />
          <div className="text-right text-[10px] text-gray-300 mt-1">{title.length}/60</div>
        </div>

        {/* 본문 */}
        <div className="bg-white rounded-2xl shadow-sm px-4 py-3 mb-3 fade-in">
          <textarea value={body} onChange={e=>setBody(e.target.value)} rows={6}
            placeholder={L.bodyPlaceholder}
            className="w-full text-sm text-gray-700 focus:outline-none placeholder-gray-300 resize-none leading-relaxed" />
        </div>

        {/* 공개 설정 */}
        <div className="bg-white rounded-2xl shadow-sm px-4 py-4 mb-3 fade-in">
          <p className="text-xs font-black text-gray-500 mb-3">{L.visLabel}</p>
          <div className="grid grid-cols-2 gap-2">
            {[['public', L.visPublic, L.visPublicDesc,'border-blue-300 bg-blue-50 text-blue-700'],
              ['private', L.visPrivate, L.visPrivateDesc,'border-gray-400 bg-gray-100 text-gray-700']].map(([v,l,d,sel])=>(
              <button key={v} onClick={()=>setVis(v)}
                className={`py-3 rounded-xl border-2 text-center transition tap ${vis===v?sel:'border-gray-200 text-gray-400'}`}>
                <p className="text-sm font-bold">{l}</p>
                <p className="text-[10px] mt-0.5 opacity-70">{d}</p>
              </button>
            ))}
          </div>
        </div>

        {/* 🔑 비밀번호 (신규 작성 시만 표시) */}
        {!isEdit && (
          <div className="bg-white rounded-2xl shadow-sm px-4 py-4 mb-3 fade-in">
            <p className="text-xs font-black text-gray-700 mb-1">{L.pwFieldLabel}</p>
            <p className="text-[10px] text-gray-400 mb-3">{L.pwFieldNote}</p>
            <input
              type="password" inputMode="numeric" maxLength={4}
              value={pw}
              onChange={e => setPw(e.target.value.replace(/\D/g,''))}
              placeholder={L.pwFieldPlaceholder}
              className="w-full border-2 border-gray-200 rounded-xl px-4 py-3 text-center text-xl tracking-[0.4em] focus:outline-none focus:border-blue-700 transition"
            />
          </div>
        )}

        {/* 🔒 개인정보 보호 경고 */}
        <div className="bg-red-50 border border-red-200 rounded-2xl px-4 py-3 mb-3 fade-in">
          <p className="text-xs font-black text-red-700 mb-2">{L.privacyTitle}</p>
          <ul className="flex flex-col gap-1.5">
            {[L.privacy1, L.privacy2, L.privacy3, L.privacy4].map((t,i) => (
              <li key={i} className="flex items-start gap-1.5 text-xs text-red-600">
                <span className="flex-shrink-0 mt-0.5">⚠️</span>{t}
              </li>
            ))}
          </ul>
        </div>

        {/* 익명 안내 */}
        <div className="bg-blue-50 rounded-2xl px-4 py-3 mb-5 flex items-center gap-2 fade-in">
          <span className="text-lg">🙈</span>
          <p className="text-xs text-blue-700 word-keep">{L.anonNote}</p>
        </div>

        {/* 버튼 */}
        <div className="flex gap-3 fade-in">
          <button onClick={goBack}
            className="flex-1 py-4 border border-gray-200 rounded-2xl text-sm font-bold text-gray-500 bg-white tap transition">
            {L.cancelBtn}
          </button>
          <button onClick={submit}
            className="flex-[2] py-4 bg-blue-700 text-white rounded-2xl text-sm font-black tap transition">
            {L.submitBtn}
          </button>
        </div>
      </div>

      {toast && <Toast msg={toast} onClose={()=>setToast(null)} />}
    </div>
  );
}

/* ================================================================
   루트 App — 상태 기반 라우터
================================================================ */
function App() {
  const [route,    setRoute]    = useState({ page:'home', param:null });
  const [lang,     setLang]     = useState('vi');
  const [visaType, setVisaType] = useState(() => localStorage.getItem(VISA_TYPE_STORE) || null);
  const { posts, addPost, deletePost, updatePost, addComment, deleteComment } = usePosts();

  function nav(r) {
    setRoute(r);
    window.scrollTo({ top:0, behavior:'instant' });
  }
  function toggleLang() { setLang(l => l === 'vi' ? 'ko' : 'vi'); }
  function handleSetVisaType(type) {
    if (type) localStorage.setItem(VISA_TYPE_STORE, type);
    else      localStorage.removeItem(VISA_TYPE_STORE);
    setVisaType(type);
  }

  const shared = { nav, posts, lang, onAddPost:addPost, onDeletePost:deletePost, onUpdatePost:updatePost, onAddComment:addComment, onDeleteComment:deleteComment };

  switch (route.page) {
    case 'guide':     return <GuidePage     type={route.param}     onBack={()=>nav({page:'home'})} lang={lang} />;
    case 'checklist':
      if (route.param==='sales') return <SalesPage onBack={()=>nav({page:'home'})} lang={lang} />;
      if (route.param==='score') return <ScorePage onBack={()=>nav({page:'home'})} lang={lang} />;
      return null;
    case 'docs':      return <DocsPage      onBack={()=>nav({page:'home'})} lang={lang} />;
    case 'office':    return <OfficePage    onBack={()=>nav({page:'home'})} lang={lang} />;
    case 'board':     return <BoardPage     cat={route.param}      {...shared} />;
    case 'write':     return <WritePage     initCat={route.param}  editPost={route.editPost} {...shared} />;
    default:          return <HomePage      {...shared} toggleLang={toggleLang} visaType={visaType} onSetVisaType={handleSetVisaType} />;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
